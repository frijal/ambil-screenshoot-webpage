name: "🛠️ Dapur Maintenance (All-in-One)"

on:
  schedule:
    - cron: 20 9 */6 * *
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pilih Mode Operasi'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit       # Hanya cek kesehatan dapur (Cepat)
          - upgrade     # Update paket + Sync Aset + Audit
          - paket      # Add/Remove paket + Sync Aset + Audit
      upgrade_type:
        description: 'Tipe upgrade (khusus upgrade)'
        required: false
        default: 'minor'
        type: choice
        options: [minor, latest]
      action:
        description: 'Aksi (khusus paket)'
        required: false
        default: 'add'
        type: choice
        options: [add, remove]
      packages:
        description: 'Nama paket'
        required: false
        default: ''
      is_dev:
        description: 'DevDependency?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
          persist-credentials: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # --- STEP 1: EKSEKUSI PAKET (Hanya jika mode Upgrade/Manage/Schedule) ---
      - name: 🚀 Upgrade/Manage Packages
        if: github.event_name == 'schedule' || (github.event.inputs.mode == 'upgrade' || github.event.inputs.mode == 'paket')
        run: |
          MODE="${{ github.event.inputs.mode }}"
          ACTION="${{ github.event.inputs.action }}"
          PKGS="${{ github.event.inputs.packages }}"
          IS_DEV="${{ github.event.inputs.is_dev }}"
          UPGRADE_TYPE="${{ github.event.inputs.upgrade_type || 'minor' }}"

          if [[ "$MODE" == "upgrade" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "Running Mega Upgrade..."
            bun install
            bunx npm-check-updates -u --target "$UPGRADE_TYPE"
            bun install
          elif [[ "$MODE" == "paket" && -n "$PKGS" ]]; then
            if [[ "$ACTION" == "add" ]]; then
              echo "Adding packages: $PKGS"
              if [[ "$IS_DEV" == "true" ]]; then
                bun add -d $PKGS
              else
                bun add $PKGS
              fi
            elif [[ "$ACTION" == "remove" ]]; then
              echo "Removing packages: $PKGS"
              bun remove $PKGS
            fi
            bun install --production
          fi

      - name: 🌈 Sync & Map Assets
        if: github.event_name == 'schedule' || (github.event.inputs.mode == 'upgrade' || github.event.inputs.mode == 'paket')
        run: |
          set -euo pipefail

          # 1. Install paket yang perlu dicopy dari node_modules
          # marked tidak wajib diinstall lokal karena akan diambil langsung dari npm registry + CDN
          bun add @highlightjs/cdn-assets@latest @fortawesome/fontawesome-free@latest html2canvas@latest html2pdf.js@latest --no-save --trusted
          bun pm untrusted

          # 2. Pastikan folder tujuan tersedia
          mkdir -p dapur/fontawesome-webfonts
          mkdir -p mini

          # 3. Copy aset statis
          cp -f node_modules/@fortawesome/fontawesome-free/webfonts/* dapur/fontawesome-webfonts/
          cp -f node_modules/@fortawesome/fontawesome-free/css/all.min.css dapur/fontawesome.css

          cp -f node_modules/@highlightjs/cdn-assets/highlight.min.js dapur/highlight.js
          cp -f node_modules/@highlightjs/cdn-assets/styles/atom-one-dark.min.css dapur/atom-one-dark.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/atom-one-light.min.css dapur/atom-one-light.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/default.min.css dapur/prism.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/github*.css dapur/ 2>/dev/null || true
          cp -f node_modules/@highlightjs/cdn-assets/styles/monokai.min.css dapur/monokai.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/monokai.min.css dapur/prism-okaidia.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/tomorrow-night-bright.css dapur/prism-tomorrow.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/vs.min.css dapur/vs.min.css
          cp -f node_modules/@highlightjs/cdn-assets/styles/vs2015.min.css dapur/vs-dark.min.css

          cp -f node_modules/html2canvas/dist/html2canvas.min.js dapur/html2canvas.min.js
          cp -f node_modules/html2pdf.js/dist/html2pdf.bundle.min.js dapur/html2pdf.bundle.min.js

          # 4. Ambil Marked langsung dari npm registry + CDN
          # File browser Marked versi baru berada di lib/marked.umd.js
          MARKED_VER=$(curl -fsSL https://registry.npmjs.org/marked/latest | jq -r .version)

          curl -fsSL \
            "https://cdn.jsdelivr.net/npm/marked@${MARKED_VER}/lib/marked.umd.js" \
            -o dapur/marked.min.js

          # 5. qrcodejs tetap pakai curl
          curl -fsSL \
            https://raw.githubusercontent.com/davidshimjs/qrcodejs/master/qrcode.min.js \
            -o dapur/qrcode.min.js

          # 6. Sesuaikan path fontawesome
          sed -i 's|\.\./webfonts/|./fontawesome-webfonts/|g' dapur/fontawesome.css

          # 7. Eksekusi Koki (Transpile markdown.ts ke /ext/markdown.js)
          bun dapur/koki.ts --once

          # 8. Update Metadata
          FA_VER=$(jq -r .version node_modules/@fortawesome/fontawesome-free/package.json)
          H2C_VER=$(jq -r .version node_modules/html2canvas/package.json)
          H2PDF_VER=$(jq -r .version node_modules/html2pdf.js/package.json)
          HLJS_VER=$(jq -r .version node_modules/@highlightjs/cdn-assets/package.json)
          MARKED_VER="${MARKED_VER:-$(curl -fsSL https://registry.npmjs.org/marked/latest | jq -r .version)}"

          # 9. Simpan ke asset-info.txt
          echo -e "fontawesome=$FA_VER\nhtml2canvas=$H2C_VER\nhtml2pdf=$H2PDF_VER\nhljs=$HLJS_VER\nmarked=$MARKED_VER\nqrcode=1.0.0-davidshimjs" | sort > mini/asset-info.txt

      # --- STEP 3: AUDIT (Selalu Jalan untuk SEMUA mode) ---
      - name: 🧹 Jalankan Sapu Bersih (Audit)
        run: |
          bun run dapur/sapu-bersih.ts

      - name: 🔍 Font Integrity Check (Statis)
        id: font_check
        run: |
          OUTPUT="mini/fontawesome-verify.txt"
          PREV="mini/fontawesome-verify-prev.txt"
          [ -f "$OUTPUT" ] && cp "$OUTPUT" "$PREV" || touch "$PREV"
          printf "Font Integrity Report\nFilename | Size | SHA-256\n" > "$OUTPUT"
          find dapur/fontawesome-webfonts -type f -regex ".*\.\(woff\|woff2\|ttf\)" | sort | while read -r f; do
              printf "%s | %s | %s\n" "$(basename "$f")" "$(stat -c%s "$f")" "$(sha256sum "$f" | awk '{print $1}')" >> "$OUTPUT"
          done
          [ -s "$PREV" ] && ! diff -q "$PREV" "$OUTPUT" > /dev/null && echo "alert=true" >> $GITHUB_OUTPUT || echo "alert=false" >> $GITHUB_OUTPUT

      # --- STEP 4: FILTER & CREATE PR ---
      - name: 🛡️ Change Detection
        id: filter
        run: |
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 📨 Create Pull Request
        if: steps.filter.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@d32e88dac789dcc7906e7d26f69f24116fa9c97d
        with:
          title: "chore: 🛠️ Dapur Maintenance [${{ github.event.inputs.mode || 'Auto' }}]"
          commit-message: "chore: automated sync and audit result"
          branch: "maintenance-update"
          delete-branch: true
          body: |
            🔧 **Maintenance Selesai!**

             **Detail:**
             - **Mode:** `${{ github.event.inputs.mode || 'Scheduled' }}`
             - **Font Integrity:** ${{ steps.font_check.outputs.alert == 'true' && '🚨 BERUBAH' || '✅ IDENTIK' }}
             - **Log Audit:** Silakan cek folder `sementara/audit/`.
