name: 📸 Generate Screenshots (Bun Powered)

on:
  workflow_dispatch:
  # Kamu bisa aktifkan schedule di sini jika ingin otomatis tiap jam/hari
  # schedule:
  #   - cron: '0 * * * *'

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: ⚙️ 1. Checkout Kode
        uses: actions/checkout@v4 # Versi stabil terbaru
        with:
          fetch-depth: 0 # Penting untuk rebase yang aman

      - name: 🚀 2. Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 3. Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🌐 4. Setup Puppeteer Chromium
        # Bun bisa menjalankan npx, tapi lebih baik pakai 'bun x' agar lebih konsisten
        run: bun x puppeteer install --auto-install-revisions

      - name: 📸 5. Generate Screenshots & RSS
        run: |
          echo "Running generation scripts..."
          # Jalankan start (RSS) dan screenshot menggunakan Bun
          bun run start
          bun run screenshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Jika skrip Gemini butuh API Key, tambahkan di sini:
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ⬆️ 6. Commit and Push Changes
        run: |
          # Konfigurasi Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage folder img/ dan artikel/ serta file xml/json di root
          git add img/ artikel/ rss.xml sitemap.xml sitemap.txt artikel.json 2>/dev/null || true
          
          # Logika pengecekan perubahan
          if git diff --staged --quiet; then
            echo "✅ Tidak ada perubahan file, skip push."
          else
            echo "⏳ Perubahan ditemukan. Melakukan commit..."
            git commit -m "build: 🚀 auto-update content & screenshots [skip ci]"
            
            # Sinkronisasi sebelum push (Rebase lebih bersih untuk workflow)
            git pull --rebase origin main
            git push origin main
          fi

      - name: 📊 7. Summary Report
        if: always()
        run: |
          echo "--- Summary ---"
          echo "✅ Digital Assets Updated at: https://dalam.web.id"
          
          # Menghitung file dengan cara yang lebih aman
          HTML_COUNT=$(find artikel -name "*.html" | wc -l || echo 0)
          IMG_COUNT=$(find img -name "*.webp" | wc -l || echo 0)
          
          echo "➡️  Total Artikel: $HTML_COUNT"
          echo "➡️  Total Gambar : $IMG_COUNT"
          echo "Triggered by: ${{ github.event_name }}"
